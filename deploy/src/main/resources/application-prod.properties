spring.application.name=deepcover-brain
spring.main.allow-circular-references=true
env=PROD
app.id=deepcover-brain
# Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://YOUR_MYSQL_HOST:3306/deepcover?useUnicode=true&characterEncoding=utf8&characterResultSets=utf8&autoReconnect=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
# Connection pool settings
spring.datasource.initialSize=5
spring.datasource.minIdle=1
spring.datasource.maxActive=50
spring.datasource.maxWait=60000
spring.mvc.async.request-timeout=300000
# MyBatis configuration
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.config-location=classpath:mybatis-config.xml
mybatis.type-aliases-package=io.deepcover.brain.model.agent
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# Disable service registry
eureka.client.fetchRegistry=false
eureka.client.registerWithEureka=false
ahas.enabled=false
spring.session.store-type=none

server.port=8080
dingTalk.need.send=false
mq.server=YOUR_ROCKETMQ_SERVER:9876
datacenter.url=http://YOUR_DATACENTER_HOST/
mq.close=false
datacenter.callback.brain.consumer=deepcover_hbase_code_info_consumer
datacenter.callback.brain.topic=deepcover_hbase_code_info_topic
